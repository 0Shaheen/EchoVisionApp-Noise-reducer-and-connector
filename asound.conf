# /etc/asound.conf — INMP441 dual I2S microphone
# Copy to /etc/asound.conf on the Raspberry Pi
#
# The INMP441 sends 24-bit audio in 32-bit I2S frames (S32_LE format).
# Test with: arecord -D smartmic -c 2 -r 16000 -f S32_LE -d 3 test.wav

pcm.smartmic {
    type     hw
    card     0
    device   0
    format   S32_LE
    rate     16000
    channels 2
}

ctl.smartmic { type hw; card 0 }

pcm.!default  { type hw; card 0; device 0 }
ctl.!default  { type hw; card 0 }
